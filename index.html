var FENICI_TEXT = "IL MAR MEDITERRANEO\nIl Mar Mediterraneo \xE8 un mare quasi completamente chiuso che bagna tre continenti. A nord, infatti, si trova l'Europa, a sud-est l'Asia e a sud l'Africa. Per questo motivo il nome Mediterraneo significa \"in mezzo alle terre\".\nI popoli che vivevano lungo le sue coste impararono ben presto a sfruttare le risorse offerte da questo mare, facilmente navigabile, ricco di porti naturali e pescoso.\nIl Mar Mediterraneo, inoltre, forniva anche il sale. Questo prodotto era importantissimo perch\xE9 permetteva di conservare i cibi in un periodo in cui non c'era altro modo per farlo.\nIl clima mite delle terre affacciate sul Mar Mediterraneo favoriva l'agricoltura e le coltivazioni di olivo e di vite, i cui prodotti erano molto ricercati nel mondo antico.\nGrazie a tutte queste caratteristiche, Fenici, Cretesi e Micenei si stabilirono lungo le coste e nelle isole del Mar Mediterraneo e iniziarono a esplorarlo e a commerciare via mare con popoli vicini e lontani.\nI FENICI\nDOVE: I Fenici si stabilirono lungo le coste orientali del Mediterraneo, nella sottile striscia di terra fertile tra il mare e una catena di monti ricoperta da foreste di cedro. Il cedro \xE8 un albero ricco di resina naturale, una caratteristica che lo rende resistente all'acqua salata e, quindi, molto adatto alla costruzione di navi.\nQUANDO: La civilt\xE0 dei Fenici inizi\xF2 a svilupparsi nel 2000 a.C. circa. Pur non avendo informazioni certe sulla loro provenienza, sembra che fossero originari della Mesopotamia. Intorno al 1200 a.C. i Fenici fondarono nuove citt\xE0 in Africa e in Europa ed erano un grande popolo commerciale con tutti i popoli che si affacciavano sul Mediterraneo. Verso il 700 a.C. furono conquistati dagli Assiri, poi dai Babilonesi e, infine, nel 64 a.C. vennero parte dell'Impero di Roma.\nATTIVIT\xC0 ECONOMICHE: I Fenici praticarono poco l'agricoltura, coltivando soprattutto cereali, ulivi, datteri e fichi. L'abbondanza di alberi di cedro, la vicinanza al mare e le coste ricche di approdi e porti naturali li portarono a dedicarsi soprattutto alla costruzione di imbarcazioni e al commercio via mare. I Fenici erano esperti artigiani. Utilizzavano varie materie prime (argento, rame, avorio, ambra), acquistate da altri Paesi per realizzare oggetti di lusso che rivendevano ad altri popoli. Il loro prodotto pi\xF9 famoso era la porpora, un colorante naturale ricavato da un mollusco, il murice, che veniva utilizzato per tingere di rosso i tessuti. Erano molto abili anche nella lavorazione del vetro con la tecnica della soffiatura. Inventarono le saline per ricavare il sale.\nORGANIZZAZIONE: I Fenici erano organizzati in citt\xE0-stato. Ogni citt\xE0 era governata da un re aiutato dai sacerdoti e da un'assemblea di anziani composta da ricchi mercanti. Le citt\xE0-stato pi\xF9 famose furono Sidone, Biblo e Tiro.\nLE COLONIE: I luoghi di scalo detti empori divennero colonie. La pi\xF9 famosa \xE8 Cartagine in Tunisia. Altre colonie: Cadice e Malaga in Spagna, Cagliari e Tharros in Sardegna, Palermo e Mozia in Sicilia.\nRELIGIONE: El era il dio dell'universo. Sua moglie Balaat era la dea della maternit\xE0. Baal era il dio della pioggia, figlio di Balaat. Astarte era la dea della fertilit\xE0 della terra. Melqart era il dio del mare e del commercio. I luoghi sacri si chiamavano tofet.\nNAVI: Inventarono l'ancora, la chiglia, la vela quadrata, il ponte della nave e il timone. Le navi militari avevano il rostro. Si orientavano con la Stella Polare, detta anche Stella Fenicia.\nSCRITTURA: Idearono la scrittura fonetica con un alfabeto di 22 consonanti. Dall'alfabeto fenicio deriva l'alfabeto che usiamo ancora oggi.\nMONETA: Prima usarono il baratto, poi la moneta inventata dagli abitanti di Lidia.";
var CINA_TEXT = "LA CIVILT\xC0 CINESE\nDOVE: In Asia la zona pianeggiante fra il Fiume Giallo e il Fiume Azzurro era abitata fin dal Neolitico grazie ai terreni molto fertili perch\xE9, durante le piene, vi si depositava il limo, un fango di colore giallastro, di cui il Fiume Giallo era ricco. Con il tempo, la civilt\xE0 cinese si espanse occupando un territorio vastissimo dell'Asia.\nQUANDO: La civilt\xE0 cinese inizi\xF2 a svilupparsi intorno al 3500 a.C., quando i Cinesi si organizzarono in villaggi, formando delle comunit\xE0 dette clan. Nel 1800 a.C. i clan si unirono dando origine a regni. Nel 221 a.C. il re della dinastia Qin, che si pronuncia \"cin\" e da cui deriva il nome \"Cina\", un\xEC i regni formando un unico impero che dur\xF2 addirittura fino al 1912 d.C.\nORGANIZZAZIONE: In origine i Cinesi erano organizzati in clan che, in seguito, diedero origine a regni. Ogni regno era governato da un re e, alla sua morte, l'intero regno veniva ereditato dal figlio. Questo periodo venne detto periodo delle dinastie perch\xE9 il regno si tramandava all'interno di una sola famiglia. Quando i regni si unirono venne formato l'impero cinese, che aveva un unico sovrano. Il sovrano viveva nella capitale con la corte e i sacerdoti. Era il capo politico e religioso, era protetto da un proprio esercito e alla sua morte veniva sepolto in una tomba regale, piena di oggetti preziosi. Ogni regno era amministrato dai mandarini, funzionari scelti tra le famiglie nobili di proprietari terrieri. La maggioranza della popolazione era formata da mercanti, artigiani e agricoltori.\nCULTURA E ARTE - La scrittura: Inizialmente i Cinesi usarono i pittogrammi, cio\xE8 dei disegni stilizzati che rappresentavano oggetti. I primi testi cinesi erano divinatori, usati cio\xE8 per predire il futuro. Un po' alla volta iniziarono a usare gli ideogrammi, segni che rappresentavano un oggetto, un'idea o un'azione. Ancora oggi alcuni ideogrammi antichi sono usati in Cina.\nCONOSCENZE, INVENZIONI E SCOPERTE: I Cinesi furono grandi inventori e molte delle loro invenzioni hanno portato grandi cambiamenti nella storia dell'umanit\xE0. Nel 239 a.C. circa inventarono la bussola, che inizialmente fu usata come un gioco ma che, in seguito, divenne uno strumento indispensabile per orientarsi. I Cinesi svilupparono tecniche di produzione di leghe come il bronzo, ottenuto fondendo rame e stagno. In medicina inventarono l'agopuntura, una tecnica per sbloccare l'energia vitale utilizzando degli aghi sottilissimi. I Cinesi erano anche molto esperti di astronomia, registravano le eclissi lunari e solari e realizzarono i primi globi celesti, usati per mostrare le posizioni delle stelle.\nRELIGIONE: I Cinesi erano politeisti. La loro religione era legata alle forze della natura e al culto degli antenati. Credevano che gli spiriti degli antenati proteggessero le loro famiglie. Tra il 570 e il 470 a.C. due grandi pensatori, Lao Tse e Confucio, fondarono il taoismo e il confucianesimo. Queste due religioni erano basate sulla meditazione, sulla tolleranza e sull'armonia tra l'essere umano e la natura.\nATTIVIT\xC0 ECONOMICHE: I Cinesi si dedicavano principalmente all'agricoltura, producendo riso, orzo, miglio e soia. Molto praticato era l'allevamento di maiali, pecore, capre e bachi da seta da cui ricavavano un filato molto prezioso usato per realizzare i tessuti di seta. Si dedicavano all'artigianato, realizzando oggetti in bronzo e in ceramica. Il commercio con i popoli lontani si svilupp\xF2 intorno al 1000 a.C. e si svolgeva lungo una strada carovaniera chiamata la Via della Seta, perch\xE9 questo era il prodotto pi\xF9 richiesto.";
var MAYA_TEXT = "I MAYA\nDOVE: La civilt\xE0 dei Maya si svilupp\xF2 nella penisola dello Yucatan, un territorio ricco di pozzi naturali di acqua dolce e con piogge abbondanti. Con il passare del tempo i Maya ampliarono il loro territorio fino a comprendere una vasta zona dell'America Centrale.\nQUANDO: Le prime trib\xF9 nomadi arrivarono nello Yucatan intorno al 2000 a.C. Nel 1100 a.C. i Maya erano organizzati in citt\xE0-stato indipendenti, ognuna delle quali era governata da un re, considerato una divinit\xE0. Le diverse citt\xE0-stato avevano in comune la lingua, la religione e la cultura.\nATTIVIT\xC0 ECONOMICHE: I Maya si dedicavano soprattutto all'agricoltura: producevano mais, pomodori, cacao, peperoncino e patate. Erano anche abili commercianti. Con le popolazioni vicine scambiavano sale, pietre preziose, piume colorate, mobili e schiavi.\nCULTURA E ARTE - Le conoscenze: I Maya erano eccellenti matematici: padroneggiavano l'aritmetica, usavano il sistema decimale e avevano scoperto lo zero. Erano anche abili architetti e realizzarono piramidi a gradoni, dalla base quadrangolare, che avevano un santuario sulla sommit\xE0. Utilizzavano la scrittura a segni, chiamati glifi. I glifi potevano rappresentare sia un oggetto sia la lettera iniziale dell'oggetto stesso. Realizzarono centinaia di libri, chiamati Codici. Purtroppo, dopo il 1562 d.C., molti vennero distrutti e ne sono rimasti soltanto tre, che sono indispensabili per ricostruire la loro civilt\xE0.\nLE INVENZIONI: I Maya non avevano gli strumenti tecnologici che abbiamo oggi, ma realizzarono un calendario solare molto preciso e calcolarono che un anno era formato da 365,242 giorni. Svilupparono anche un sistema di tessitura realizzando abiti in cotone, pelle e foglie di agave. Le loro creazioni erano spesso decorate con conchiglie e pezzetti di legno.\nRELIGIONE: I Maya erano politeisti e le loro divinit\xE0 rappresentavano le forze della natura. Per ottenere favori dalle divinit\xE0, i Maya praticavano molti riti, come il gioco della palla. Itzamna era il dio del cielo. Chac era il dio della pioggia. Kukulkan era il dio creatore. Yum Kaax era il dio del mais.";
var VALLINDI_TEXT = "I VALLINDI\nDOVE: I Vallindi erano un popolo pacifico che si insedi\xF2 nella valle del fiume Indo, dove il terreno era particolarmente fertile. Lungo le sponde del fiume sorsero le grandi citt\xE0 di Harappa e di Mohenjo-Daro. In seguito altre citt\xE0 vennero edificate anche lungo la costa che si affaccia sul Mar Arabico.\nQUANDO: La civilt\xE0 dei Vallindi si svilupp\xF2 nel 2500 a.C. circa. Intorno al 1900 a.C. i territori su cui i Vallindi vivevano iniziarono a inaridirsi e uno dei fiumi su cui sorgevano alcune delle loro citt\xE0 scomparve. Nel 1800 a.C. circa le citt\xE0 furono abbandonate e gli abitanti si spostarono in altri territori. Intorno al 1500 a.C. gli Arii, un popolo nomade proveniente dall'Asia centrale, si insediarono in quest'area, occupandola fino al fiume Gange.\nATTIVIT\xC0 ECONOMICHE: I Vallindi praticavano l'agricoltura: coltivavano grano, riso, legumi e piante di cotone. Anche l'artigianato era molto sviluppato, realizzavano vasellame, tessuti in cotone e magnifici gioielli in pietre preziose. Contrassegnavano i loro prodotti con i sigilli in terracotta dove erano incisi dei simboli per indicare chi aveva realizzato l'oggetto. Commerciavano con popoli anche lontani, infatti alcuni sigilli e prodotti di questa civilt\xE0 sono stati ritrovati nella citt\xE0 di Ur, in Mesopotamia, e in Egitto.\nORGANIZZAZIONE - La societ\xE0: Gli storici hanno poche conoscenze sulla societ\xE0 dei Vallindi. Poich\xE9 non sono stati trovati resti di palazzi reali, si pensa che le decisioni fossero prese da assemblee di cittadini. Probabilmente il governo era affidato a un re-sacerdote. Le citt\xE0 pi\xF9 conosciute sono Harappa e Mohenjo-Daro, abitate da circa 50 mila abitanti. Nel 1954 furono scoperti i resti della citt\xE0 di Lothal, sulla costa che si affaccia sul Mar Arabico. Le citt\xE0 erano suddivise in una zona alta con edifici pubblici, magazzini e piscine rituali, e una zona bassa con abitazioni, laboratori e botteghe. Ogni citt\xE0 era dotata di una rete di distribuzione dell'acqua e di fognature sotterranee.\nRELIGIONE: I sacerdoti si occupavano dei riti rivolti alle numerose divinit\xE0, come la Dea Madre, considerata la madre di tutti gli esseri viventi.\nCULTURA E ARTE - La scrittura: I Vallindi usavano un tipo di scrittura chiamata pittografica perch\xE9 il segno riproduceva l'oggetto. Della loro scrittura si sa molto poco e le studiose e gli studiosi hanno fornito diverse interpretazioni sui 400 segni trovati fino a oggi sulle numerose incisioni dei sigilli. Le incisioni rinvenute non sono state ancora decifrate e rappresentano soprattutto figure di animali come unicorni, elefanti, tigri, bufali e uri.\nCONOSCENZE, INVENZIONI E SCOPERTE: I Vallindi erano abili matematici e utilizzavano un sistema di numerazione che si basava su unit\xE0, decine e centinaia. Realizzarono anche un sistema di pesi e di misure, considerato il primo della Storia. Erano ottimi ingegneri: oltre al sistema di distribuzione delle acque, realizzarono condotti di aerazione per proteggere le persone dalle alte temperature. I Vallindi riuscirono a ricavare una fibra tessile dalla pianta di cotone con cui realizzare tessuti.";
